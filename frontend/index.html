


<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Lista de Pessoas</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 20px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      cursor: pointer;
    }

    th {
      background-color: #f4f4f4;
      cursor: default;
    }

    input {
      margin-bottom: 10px;
      padding: 5px;
      width: 250px;
    }

    button {
      padding: 8px 12px;
      margin-right: 5px;
    }
  </style>
</head>

<body>

<h1>Lista de Pessoas</h1>

<div>
  <label>ID:</label><br>
  <input type="text" id="id" readonly><br>

  <label>Nome:</label><br>
  <input type="text" id="nome"><br>

  <label>Idade:</label><br>
  <input type="number" id="idade"><br>

  <label>Última Atualização:</label><br>
  <input type="text" id="atualizacao" readonly><br>
</div>

<div>
  <button onclick="limpar()">Limpar</button>
  <button onclick="incluir()">Cadastrar</button>
  <button onclick="salvar()">Salvar</button>
  <button onclick="excluir()">Excluir</button>
</div>

<hr>

<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Nome</th>
      <th>Idade</th>
      <th>Atualização</th>
    </tr>
  </thead>
  <tbody id="tabela"></tbody>
</table>

<script>

  // 🔥 DETECTA AUTOMATICAMENTE O AMBIENTE
  const API_URL =
    window.location.hostname === '127.0.0.1' ||
    window.location.hostname === 'localhost'
      ? 'http://127.0.0.1:3000/pessoas'
      : 'https://pessoas-api.onrender.com/pessoas';

  async function carregarPessoas() {
    try {
      const resposta = await fetch(API_URL);

      if (!resposta.ok) {
        throw new Error('Erro na requisição');
      }

      const dados = await resposta.json();

      const tbody = document.getElementById('tabela');
      tbody.innerHTML = '';

      dados.forEach(pessoa => {
        const linha = document.createElement('tr');

        linha.innerHTML = `
          <td>${pessoa.id}</td>
          <td>${pessoa.nome}</td>
          <td>${pessoa.idade}</td>
          <td>${pessoa.updated_at ?? ''}</td>
        `;

        linha.addEventListener('click', () => {
          selecionarPessoa(pessoa);
        });

        tbody.appendChild(linha);
      });

    } catch (erro) {
      console.error('Erro ao carregar pessoas:', erro);
      alert('Erro ao carregar dados.');
    }
  }

  async function incluir() {
    try {
      const nome = document.getElementById('nome').value.trim();
      const idade = document.getElementById('idade').value;

      if (!nome || !idade) {
        alert('Preencha nome e idade.');
        return;
      }

      const resposta = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          nome,
          idade: Number(idade)
        })
      });

      if (!resposta.ok) {
        throw new Error('Erro ao cadastrar');
      }

      limpar();
      await carregarPessoas();

      alert('Pessoa cadastrada!');
    } catch (erro) {
      console.error('Erro ao cadastrar:', erro);
      alert('Erro ao cadastrar.');
    }
  }

  async function salvar() {
    try {
      const id = document.getElementById('id').value;
      const nome = document.getElementById('nome').value.trim();
      const idade = document.getElementById('idade').value;

      if (!id) {
        alert('Selecione um registro.');
        return;
      }

      const resposta = await fetch(`${API_URL}/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          nome,
          idade: Number(idade)
        })
      });

      if (!resposta.ok) {
        throw new Error('Erro ao salvar');
      }

      limpar();
      await carregarPessoas();

      alert('Registro atualizado!');
    } catch (erro) {
      console.error('Erro ao salvar:', erro);
      alert('Erro ao salvar.');
    }
  }

  async function excluir() {
    try {
      const id = document.getElementById('id').value;

      if (!id) {
        alert('Selecione um registro.');
        return;
      }

      if (!confirm('Deseja excluir?')) return;

      const resposta = await fetch(`${API_URL}/${id}`, {
        method: 'DELETE'
      });

      if (!resposta.ok) {
        throw new Error('Erro ao excluir');
      }

      limpar();
      await carregarPessoas();

      alert('Registro excluído!');
    } catch (erro) {
      console.error('Erro ao excluir:', erro);
      alert('Erro ao excluir.');
    }
  }

  function selecionarPessoa(pessoa) {
    document.getElementById('id').value = pessoa.id ?? '';
    document.getElementById('nome').value = pessoa.nome ?? '';
    document.getElementById('idade').value = pessoa.idade ?? '';
    document.getElementById('atualizacao').value = pessoa.updated_at ?? '';
  }

  function limpar() {
    document.getElementById('id').value = '';
    document.getElementById('nome').value = '';
    document.getElementById('idade').value = '';
    document.getElementById('atualizacao').value = '';
  }

  carregarPessoas();

</script>

</body>
</html>
