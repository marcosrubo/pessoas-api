


<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Lista de Pessoas</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: left;
    }

    th {
      background-color: #f4f4f4;
    }

    #mensagem {
      margin-top: 15px;
      color: red;
    }
  </style>
</head>

<body>


<!-- desenvolvendo Layout para tbl_pessoas -->    

<h1>Lista de Pessoas</h1>

<div>
  <label>ID:</label>
  <input type="text" id="id" readonly><br><br>

  <label>Nome:</label>
  <input type="text" id="nome"><br><br>

  <label>Idade:</label>
  <input type="number" id="idade"><br><br>

  <label>Última Atualização:</label>
  <input type="text" id="atualizacao" readonly><br><br>
</div>

<div>
  <button onclick="limpar()">Limpar</button>
  <button onclick="incluir()">Cadastrar</button>
  <button onclick="salvar()">Salvar</button>
  <button onclick="excluir()">Excluir</button>
</div>

<hr>

<table border="1">
  <thead>
    <tr>
      <th>ID</th>
      <th>Nome</th>
      <th>Idade</th>
      <th>Atualização</th>
    </tr>
  </thead>
  <tbody id="tabela"></tbody>
</table>

  <script>
    async function carregarPessoas() {
      try {

        // para acesso local:
        const resposta = await fetch('http://127.0.0.1:3000/pessoas');
        
        // para acesso web:
        // const resposta = await fetch('https://pessoas-api.onrender.com/pessoas');

        if (!resposta.ok) {
          throw new Error('Erro na requisição');
        }

        const dados = await resposta.json();

        const tbody = document.querySelector('#tabela tbody');
        tbody.innerHTML = '';

        if (dados.length === 0) {
          document.getElementById('mensagem').textContent = 'Nenhum registro encontrado.';
          return;
        }

        dados.forEach(pessoa => {
          const linha = `
            <tr>
              <td>${pessoa.id}</td>
              <td>${pessoa.nome}</td>
              <td>${pessoa.idade}</td>
            </tr>
          `;
          tbody.innerHTML += linha;
        });

      } catch (erro) {
        console.error('Erro ao carregar pessoas:', erro);
        document.getElementById('mensagem').textContent = 'Erro ao carregar os dados.';
      }
    }

    carregarPessoas();
  </script>

</body>
</html>
